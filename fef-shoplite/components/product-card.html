<template id="product-card-template">
  <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col h-full group">
    <!-- Card Image & Add to Cart Container -->
    <div class="relative aspect-video w-full bg-slate-50 overflow-hidden border-b border-slate-100/60 group">
      <!-- Image Link -->
      <a href="#" class="js-card-img-link block w-full h-full">
        <img 
          src="assets/placeholder.webp"
          alt="Product Image"
          loading="lazy"
          class="js-card-img object-cover h-full w-full group-hover:scale-105 transition-transform duration-500"
        />
      </a>

      <!-- Discount badge -->
      <span class="js-card-discount-badge hidden absolute top-3 left-3 z-10 inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-bold bg-rose-500 text-white shadow-xs">
        -0% OFF
      </span>

      <!-- Hover Add to Cart Button Overlay -->
      <div class="absolute inset-0 bg-slate-950/45 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center backdrop-blur-[2px] pointer-events-none">
        <button 
          class="js-card-add-to-cart-btn pointer-events-auto px-4 py-2 text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-700 active:scale-95 rounded-xl transition-all cursor-pointer shadow-lg flex items-center gap-1.5 transform translate-y-2 group-hover:translate-y-0 duration-300"
        >
          <svg-icon src="assets/icons/shopping-cart.svg" class="h-4 w-4"></svg-icon>
          Add to Cart
        </button>
      </div>
    </div>

    <!-- Content -->
    <div class="p-5 flex-grow flex flex-col justify-between">
      <div class="space-y-2">
        <!-- Category & Rating -->
        <div class="flex items-center justify-between text-xs">
          <span class="js-card-category text-indigo-600 font-semibold uppercase tracking-wider">Category</span>
          <div class="flex items-center gap-1">
            <span class="js-card-rating-text text-slate-400">(0.0)</span>
            <div class="js-card-stars flex"></div>
          </div>
        </div>

        <!-- Title -->
        <h3 class="text-base font-bold text-slate-800 line-clamp-2 group-hover:text-indigo-600 transition-colors">
          <a href="#" class="js-card-title-link">Product Title</a>
        </h3>
      </div>

      <!-- Price & Actions -->
      <div class="mt-4 pt-4 border-t border-slate-50 flex items-center justify-between gap-4">
        <div class="flex flex-col">
          <span class="js-card-original-price hidden text-xs text-slate-400 line-through">$0.00</span>
          <span class="js-card-price text-lg font-black text-slate-800 font-outfit">$0.00</span>
        </div>
        
        <a 
          href="#" 
          class="js-card-details-btn px-4 py-2 text-xs font-semibold bg-indigo-50 text-indigo-700 hover:bg-indigo-100 rounded-xl transition-all cursor-pointer whitespace-nowrap"
        >
          Details
        </a>
      </div>
    </div>
  </div>
</template>
