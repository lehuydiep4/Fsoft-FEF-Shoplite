<!-- components/sidebar.html -->
<aside class="bg-white border border-slate-100 rounded-2xl p-5 shadow-xs space-y-6">
  <!-- Sort Section -->
  <div class="space-y-4">
    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider font-outfit">Sort By</h3>
    
    <!-- Sort by Price -->
    <div class="flex items-center justify-between gap-3">
      <span class="text-xs font-semibold text-slate-600">Price</span>
      <button id="btn-sort-price" class="px-3 py-1.5 bg-slate-50 hover:bg-slate-100 text-slate-600 border border-slate-200 rounded-lg text-[11px] font-bold transition-all flex items-center gap-1.5 cursor-pointer select-none">
        <span id="label-sort-price">High to Low</span>
        <span class="text-[9px] font-bold text-slate-400">▼</span>
      </button>
    </div>

    <!-- Sort by Name -->
    <div class="flex items-center justify-between gap-3">
      <span class="text-xs font-semibold text-slate-600">Name</span>
      <button id="btn-sort-name" class="px-3 py-1.5 bg-slate-50 hover:bg-slate-100 text-slate-600 border border-slate-200 rounded-lg text-[11px] font-bold transition-all flex items-center gap-1.5 cursor-pointer select-none">
        <span id="label-sort-name">A to Z</span>
        <span class="text-[9px] font-bold text-slate-400">▲</span>
      </button>
    </div>
  </div>
  
  <!-- Divider -->
  <div class="border-t border-slate-100 my-4"></div>

  <!-- Categories Filter -->
  <div>
    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 font-outfit">Categories</h3>
    <!-- Flex wrap to display all categories concurrently wrapping naturally -->
    <div id="sidebar-categories" class="flex flex-wrap gap-2">
      <!-- Dynamically injected category buttons -->
    </div>
  </div>
</aside>
