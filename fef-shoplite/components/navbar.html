<header class="sticky top-0 z-50 w-full bg-white/90 backdrop-blur-md border-b border-slate-100 shadow-xs">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16 gap-4">
      <!-- Logo -->
      <div class="flex-shrink-0 flex items-center">
        <a href="index.html" class="flex items-center gap-2 group">
          <div class="w-9 h-9 rounded-lg bg-indigo-600 flex items-center justify-center text-white font-black text-xl shadow-md group-hover:bg-indigo-700 transition-colors">S</div>
          <span class="text-xl font-bold tracking-tight text-slate-800">Shop<span class="text-indigo-600">Lite</span></span>
        </a>
      </div>

      <!-- Search Bar Desktop Placeholder -->
      <div id="searchbar-desktop-placeholder" class="flex-grow max-w-xs sm:max-w-md"></div>

      <!-- Desktop Navigation -->
      <nav class="hidden md:flex space-x-2 items-center flex-shrink-0">
        <a href="index.html" id="nav-home" class="p-2 flex items-center justify-center transition-colors duration-200 rounded-md" aria-label="Home" title="Home">
          <svg-icon src="assets/icons/home.svg" class="w-6 h-6"></svg-icon>
        </a>
        <a href="cart.html" id="nav-cart" class="relative p-2 flex items-center justify-center transition-colors duration-200 rounded-md" aria-label="Cart" title="Cart">
          <svg-icon src="assets/icons/cart.svg" class="w-6 h-6"></svg-icon>
          <span id="cart-badge" class="hidden absolute top-0.5 right-0.5 items-center justify-center h-4 px-1 rounded-full text-[9px] font-black bg-indigo-600 text-white min-w-4 shadow-xs">
            0
          </span>
        </a>
        <a href="register.html" id="nav-register" class="px-3 py-2 text-sm font-medium transition-colors duration-200 rounded-md whitespace-nowrap">
          Register
        </a>
      </nav>

      <!-- Mobile menu button -->
      <div class="flex items-center md:hidden">
        <button id="mobile-menu-btn" type="button" class="inline-flex items-center justify-center p-2 rounded-md text-slate-500 hover:text-indigo-600 hover:bg-slate-100 focus:outline-hidden" aria-controls="mobile-menu" aria-expanded="false">
          <span class="sr-only">Open main menu</span>
          <!-- Icon Closed -->
          <svg-icon id="menu-icon-closed" src="assets/icons/menu-closed.svg" class="block h-6 w-6"></svg-icon>
          <!-- Icon Open -->
          <svg-icon id="menu-icon-open" src="assets/icons/menu-open.svg" class="hidden h-6 w-6"></svg-icon>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div id="mobile-menu" class="hidden md:hidden border-b border-slate-200 bg-white">
    <div class="px-4 py-3 border-b border-slate-100">
      <!-- Search Bar Mobile Placeholder -->
      <div id="searchbar-mobile-placeholder"></div>
    </div>
    <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
      <a href="index.html" id="nav-mobile-home" class="flex items-center gap-2 px-3 py-2 text-sm font-medium transition-colors duration-200 rounded-md">
        <svg-icon src="assets/icons/home.svg" class="w-5 h-5"></svg-icon>
        <span>Home</span>
      </a>
      <a href="register.html" id="nav-mobile-register" class="block px-3 py-2 text-sm font-medium transition-colors duration-200 rounded-md">
        Register
      </a>
      <a href="cart.html" id="nav-mobile-cart" class="flex items-center justify-between px-3 py-2 text-sm font-medium transition-colors duration-200 rounded-md">
        <div class="flex items-center gap-2">
          <svg-icon src="assets/icons/cart.svg" class="w-5 h-5"></svg-icon>
          <span>Cart</span>
        </div>
        <span id="mobile-cart-badge" class="hidden items-center justify-center h-5 px-1.5 rounded-full text-xs font-bold bg-indigo-600 text-white min-w-5">
          0
        </span>
      </a>
    </div>
  </div>
</header>
