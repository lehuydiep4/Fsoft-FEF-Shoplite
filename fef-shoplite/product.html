<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopLite — Product Details</title>
  <!-- Google Fonts: Inter & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
  <!-- Tailwind CSS Output -->
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .font-outfit {
      font-family: 'Outfit', sans-serif;
    }
  </style>
</head>
<body class="bg-slate-50 flex flex-col min-h-screen text-slate-800 antialiased">

  <!-- Shared Navbar Injected Here -->
  <div id="navbar-placeholder"></div>

  <!-- Main Content Area -->
  <main class="flex-grow">
    
    <!-- Top Nav / Breadcrumbs -->
    <div class="bg-white border-b border-slate-100 py-4">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <a href="index.html" class="inline-flex items-center gap-2 text-sm text-slate-500 hover:text-indigo-600 transition-colors font-medium">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
          Back to Catalog
        </a>
      </div>
    </div>

    <!-- Container for dynamic product insertion -->
    <div id="detail-page-container" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
      
      <!-- Loading Skeleton -->
      <div id="detail-loading" class="grid grid-cols-1 md:grid-cols-2 gap-10 lg:gap-16 animate-pulse">
        <div class="space-y-4">
          <div class="bg-slate-200 aspect-square rounded-2xl w-full"></div>
          <div class="flex gap-4">
            <div class="bg-slate-200 h-20 w-20 rounded-xl"></div>
            <div class="bg-slate-200 h-20 w-20 rounded-xl"></div>
            <div class="bg-slate-200 h-20 w-20 rounded-xl"></div>
          </div>
        </div>
        <div class="space-y-6">
          <div class="h-4 bg-slate-200 rounded-md w-1/4"></div>
          <div class="h-8 bg-slate-200 rounded-md w-3/4"></div>
          <div class="h-4 bg-slate-200 rounded-md w-1/3"></div>
          <div class="h-6 bg-slate-200 rounded-md w-1/4"></div>
          <div class="h-24 bg-slate-200 rounded-md w-full"></div>
          <div class="h-10 bg-slate-200 rounded-md w-1/2"></div>
        </div>
      </div>

      <!-- Error Message Alert Container -->
      <div id="detail-error" class="hidden max-w-xl mx-auto p-4 border border-rose-100 bg-rose-50 text-rose-700 rounded-xl text-center shadow-xs">
        <svg class="h-10 w-10 text-rose-500 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        <p class="font-semibold text-base">Product details not found</p>
        <p id="detail-error-message" class="text-xs text-rose-500 mt-1"></p>
        <a href="index.html" class="mt-4 inline-block px-4 py-2 bg-rose-600 text-white text-xs font-semibold rounded-lg hover:bg-rose-700 transition-colors">
          Return Home
        </a>
      </div>

      <!-- Main Showcase Container (Rendered Dynamically) -->
      <div id="product-detail" class="hidden grid grid-cols-1 md:grid-cols-2 gap-10 lg:gap-16 bg-white border border-slate-100 rounded-3xl p-6 sm:p-8 md:p-12 shadow-xs">
        <!-- Injected via js/product.js -->
      </div>
    </div>
  </main>

  <!-- Shared Footer Injected Here -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script type="module" src="js/components.js"></script>
  <script type="module" src="js/product.js"></script>
</body>
</html>
